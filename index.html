<!DOCTYPE html>
<html>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: rgb(177, 255, 167);
            padding: 20px;
            justify-content: center;
            align-items: center;
        }
        form{
            background: rgb(255, 255, 255);
            padding: 30px;
            max-width: 500px;
            margin: auto;
            text-align: justify;
        }
        label{
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        fieldset{
            margin-top:20px;
            border:2px solid #ddd;
            border-radius:1px;
            padding:15px;
        }
        input[type="text"],
        textarea{
            width:100%;
            padding:10px;
            margin-top:8px;
            border:2px solid #ddd;
            border-radius:10px;
            box-sizing:border-box;
        }
        button{
        background: rgb(143, 228, 168);
        color: rgb(0, 0, 0);
        padding: 10px 20px;
        border: none;
        border-radius: 10px;

        width: 150px;

        display: none;

        }

        
    </style>

    <script>
    const burger = document.getElementById("borgir");
    const meowscar = document.getElementById("meowscarada");

    function borgirpop(){
        burger.style.left = Math.random() * window.innerWidth + "px";
        burger.style.top = Math.random() * window.innerHeight + "px";
        burger.style.display = "block";

    setInterval(borgirpop, 1111);

    function meowpop(){

    setInterval(meowpop, 1111);
